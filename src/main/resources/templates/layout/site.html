<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:fragment="layout(content, extraHead)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Hot Gamja Lab'">Hot Gamja Lab</title>
    <meta name="description" th:content="${pageDescription} ?: 'Hot Gamja Lab - Development blog and projects'">
    <meta name="author" content="Hot Gamja">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <!-- Extra head content (per-page injection point) -->
    <th:block th:replace="${extraHead} ?: ~{}"></th:block>
    <!-- Prevent FOUC: apply theme before render (3-state: system/light/dark) -->
    <script>
        (function () {
            var t = localStorage.getItem('theme');
            
            if ( t !== 'light' && t !== 'dark' && t !== 'system') {
                t = 'system';
            }
            
            var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            var isDark = (t === 'dark') || (t === 'system' && systemDark);
            document.documentElement.classList.toggle('dark', isDark);
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        })();
    </script>
</head>
<body class="flex flex-col min-h-screen">

    <!-- ===== HEADER / NAV ===== -->
    <header class="sticky top-0 z-40 border-b border-theme"
            style="background-color: var(--color-bg); backdrop-filter: blur(8px); background-color: color-mix(in srgb, var(--color-bg) 85%, transparent);">
        <nav class="flex items-center justify-between px-4 mx-auto max-w-shell md:px-6 h-14">
            <!-- Left: Logo + nav links -->
            <div class="flex items-center gap-1">
                <a th:href="@{/}" class="mr-4 text-base font-semibold link-plain shrink-0">
                    Hot Gamja
                </a>
                <!-- Desktop nav links -->
                <div class="hidden md:flex items-center gap-0.5">
                    <a th:href="@{/blog}"
                       class="link-plain px-3 py-1.5 rounded-md text-sm nav-hover transition-colors">
                        Blog
                    </a>
                    <a th:href="@{/projects}"
                       class="link-plain px-3 py-1.5 rounded-md text-sm nav-hover transition-colors">
                        Projects
                    </a>
                    <a th:href="@{/about}"
                       class="link-plain px-3 py-1.5 rounded-md text-sm nav-hover transition-colors">
                        About
                    </a>
                </div>
            </div>

            <!-- Right: icon buttons -->
            <div class="flex items-center gap-1">
                <a href="https://github.com/hot-gamja"
                   target="_blank" rel="noopener noreferrer"
                   class="hidden p-2 transition-colors rounded-md link-plain nav-hover sm:inline-flex"
                   title="GitHub">
                    <img th:src="@{/icons/github.svg}" class="w-5 h-5 dark:invert" alt="GitHub">
                </a>
                <a th:href="@{/rss}" title="RSS"
                   class="hidden p-2 transition-colors rounded-md link-plain nav-hover sm:inline-flex">
                    <img th:src="@{/icons/rss.svg}" class="w-5 h-5 dark:invert" alt="RSS">
                </a>
                <!-- Theme toggle (3-state: system / light / dark) -->
                <button id="theme-toggle"
                        class="p-2 transition-colors rounded-md nav-hover"
                        type="button"
                        aria-label="Theme: system">
                    <img id="icon-light" th:src="@{/icons/sun.svg}" class="hidden w-5 h-5 dark:invert" alt="Light theme">
                    <img id="icon-dark" th:src="@{/icons/moon.svg}" class="hidden w-5 h-5 dark:invert" alt="Dark theme">
                </button>
                <!-- Mobile menu button -->
                <button id="drawer-open"
                        class="p-2 transition-colors rounded-md nav-hover md:hidden"
                        type="button"
                        aria-label="Open menu"
                        aria-expanded="false"
                        aria-controls="mobile-drawer">
                    <img th:src="@{/icons/menu.svg}" class="w-5 h-5 dark:invert" alt="Menu">
                </button>
            </div>
        </nav>
    </header>

    <!-- ===== MOBILE DRAWER ===== -->
    <div id="drawer-overlay"
         class="fixed inset-0 z-50 transition-opacity duration-200 opacity-0 pointer-events-none bg-black/50"
         aria-hidden="true"></div>

    <aside id="mobile-drawer"
           class="fixed top-0 right-0 z-50 flex flex-col w-64 h-full transition-transform duration-200 ease-out translate-x-full"
           style="background-color: var(--color-bg);"
           aria-hidden="true"
           role="dialog"
           aria-label="Navigation menu">
        <div class="flex items-center justify-between px-4 border-b h-14 border-theme">
            <span class="text-sm font-semibold">Menu</span>
            <button id="drawer-close"
                    class="p-2 transition-colors rounded-md nav-hover"
                    type="button"
                    aria-label="Close menu">
                <img th:src="@{/icons/x.svg}" class="w-5 h-5 dark:invert" alt="Close">
            </button>
        </div>
        <nav class="flex-1 px-2 py-4 overflow-y-auto">
            <a th:href="@{/}"
               class="link-plain flex items-center px-3 py-2.5 rounded-md text-sm nav-hover transition-colors">
                Home
            </a>
            <a th:href="@{/blog}"
               class="link-plain flex items-center px-3 py-2.5 rounded-md text-sm nav-hover transition-colors">
                Blog
            </a>
            <a th:href="@{/projects}"
               class="link-plain flex items-center px-3 py-2.5 rounded-md text-sm nav-hover transition-colors">
                Projects
            </a>
            <a th:href="@{/about}"
               class="link-plain flex items-center px-3 py-2.5 rounded-md text-sm nav-hover transition-colors">
                About
            </a>
            <hr class="my-3 border-theme">
            <a href="https://github.com/hot-gamja"
               target="_blank" rel="noopener noreferrer"
               class="link-plain flex items-center gap-2 px-3 py-2.5 rounded-md text-sm nav-hover transition-colors">
                <img th:src="@{/icons/github.svg}" class="w-4 h-4 dark:invert" alt="">
                GitHub
            </a>
        </nav>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="flex-1 w-full px-4 py-8 mx-auto max-w-shell md:px-6 md:py-12">
        <div th:replace="${content}">
            <p>Page content goes here</p>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="mt-auto border-t border-theme">
        <div class="flex flex-col items-center justify-between gap-2 px-4 py-6 mx-auto text-sm max-w-shell md:px-6 sm:flex-row text-secondary">
            <p>CC BY-NC-SA 4.0 2024-PRESENT Hot Gamja</p>
            <div class="flex items-center gap-4">
                <a href="https://github.com/hot-gamja" target="_blank" rel="noopener noreferrer"
                   class="text-secondary hover:text-[var(--color-text)] transition-colors">GitHub</a>
                <a th:href="@{/rss}"
                   class="text-secondary hover:text-[var(--color-text)] transition-colors">RSS</a>
            </div>
        </div>
    </footer>

    <script th:src="@{/js/shell.js}"></script>
</body>
</html>
